<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebHachimi · 编辑+游戏一体化</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="play-mode">
    <main class="canvas-app">
      <div id="stage" class="stage" aria-label="场景区域">
        <div id="world" class="world"></div>
      </div>

      <div class="floating-hud">
        <div class="hud-right">
          <span id="modeBadge" class="hud-chip mode-chip">游戏模式</span>
          <span id="zoomBadge" class="hud-chip zoom-chip">100%</span>
          <span class="hud-chip tip-chip">按 <kbd>Z</kbd> 切换 · <kbd>Ctrl</kbd>+<kbd>R</kbd> 重置</span>
        </div>
        <p id="statusMessage" class="status-message" data-tone="info"></p>
      </div>

      <div id="stageHint" class="stage-hint hidden">按 <kbd>Z</kbd> 进入编辑，再点左侧形状创建对象</div>

      <aside id="toolDock" class="tool-dock" aria-hidden="true">
        <button id="createSquareBtn" class="dock-button" type="button"><span class="dock-icon">□</span><span class="dock-label">正方形</span></button>
        <button id="createCircleBtn" class="dock-button" type="button"><span class="dock-icon">○</span><span class="dock-label">圆形</span></button>
        <button id="createTriangleBtn" class="dock-button" type="button"><span class="dock-icon">△</span><span class="dock-label">三角形</span></button>
        <button id="createPenBtn" class="dock-button" type="button"><span class="dock-icon">✒</span><span class="dock-label">钢笔</span></button>
        <button id="createBrushBtn" class="dock-button" type="button"><span class="dock-icon">✎</span><span class="dock-label">柳叶笔</span></button>
        <div class="dock-sep"></div>
        <button id="superSketchBtn" class="dock-button alt" type="button" title="超智能画笔：在画布上画出大致规划，然后写一段说明给 AI（包工头比划）"><span class="dock-icon">🖌</span><span class="dock-label">超画笔</span></button>
        <button id="snapshotForAiBtn" class="dock-button" type="button" title="把当前画布渲染成 PNG + 上下文描述，复制到剪贴板可粘贴给 ChatGPT/Claude（按住 Shift 点击 = 下载 PNG 文件）"><span class="dock-icon">📸</span><span class="dock-label">给AI</span></button>
        <button id="undoBtn" class="dock-button" type="button" title="撤销最近一步（Ctrl+Z）"><span class="dock-icon">↶</span><span class="dock-label">撤销</span></button>
        <button id="exportSceneBtn" class="dock-button" type="button" title="导出整个场景为 .zip（含 scene.json + assets/），可解压到仓库 git 追踪"><span class="dock-icon">💾</span><span class="dock-label">导出</span></button>
        <button id="importSceneBtn" class="dock-button" type="button" title="从场景文件导入（.zip 或 .json，覆盖当前）"><span class="dock-icon">📂</span><span class="dock-label">导入</span></button>
        <input id="importSceneInput" type="file" accept=".zip,.json,application/zip,application/json" style="display:none" />
        <button id="resetGameBtn" class="dock-button danger" type="button" title="还原到上一次蓝图（Ctrl+R）"><span class="dock-icon">↺</span><span class="dock-label">重置</span></button>
      </aside>

      <section id="taskDrawer" class="floating-panel task-drawer" aria-hidden="true">
        <button id="drawerHandle" class="drawer-handle" type="button" aria-label="调整面板高度"></button>

        <div class="drawer-left">
          <div class="drawer-header">
            <div>
              <p class="panel-eyebrow">属性 / 实体</p>
              <h2 id="drawerLeftTitle">对象属性</h2>
              <p class="subtle-text">没选中对象时显示全部实体；选中后可在这里改属性、跳到子实体。</p>
            </div>
          </div>
          <div id="propsBody" class="props-body"></div>
        </div>

        <div id="drawerSplitter" class="drawer-vsplit" aria-label="调整左右宽度"></div>

        <div class="drawer-right">
          <div class="drawer-header">
            <div>
              <p id="drawerEyebrow" class="panel-eyebrow">全局任务</p>
              <h2 id="drawerTitle">全局任务</h2>
              <p id="drawerSubtitle" class="subtle-text">这是 AI / 你自己的任务备忘录，按数字 1.2.3 自动编号。</p>
            </div>
            <button id="addTaskBtn" class="small-action compact" type="button">＋任务</button>
          </div>

          <div class="command-row drawer-command">
            <input id="commandInput" type="text" placeholder="例如：地板太矮，主角 jumps 太短" />
            <button id="runCommandBtn" class="primary-pill" type="button">保存</button>
          </div>

          <div id="contextTaskList" class="task-list drawer-task-list"></div>
        </div>
      </section>

      <section id="objectContextMenu" class="floating-panel object-context-menu hidden" aria-hidden="true">
        <div class="context-menu-head">
          <strong id="contextMenuTitle">对象菜单</strong>
          <span class="context-menu-tip">右键</span>
        </div>
        <label class="field context-menu-field">
          <span>名称</span>
          <input id="contextMenuNameInput" type="text" maxlength="40" placeholder="输入对象名称" />
        </label>
        <div class="context-menu-actions">
          <button id="renameObjectBtn" class="mini-menu-button" type="button">重命名</button>
          <button id="deleteObjectBtn" class="mini-menu-button danger" type="button">删除</button>
        </div>
      </section>
    </main>

    <script src="./state.js"></script>
    <script src="./engine.js"></script>
    <script src="./dragController.js"></script>
    <script src="./taskPanel.js"></script>
    <script src="./propertyPanel.js"></script>
    <script src="./sketchTool.js"></script>
    <script src="./sceneIO.js"></script>
    <script src="./canvasSnapshot.js"></script>
    <script src="./serverSync.js"></script>
    <script src="./editor.js"></script>
    <script src="./game.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
