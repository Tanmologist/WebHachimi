name: Pages Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages_site.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build static demo
        run: npm run pages:build

      - name: Verify static demo
        run: npm run pages:verify

      - name: Detect GitHub Pages setup
        id: pages_site
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${GITHUB_REPOSITORY}/pages" --silent

      - name: Configure GitHub Pages
        if: steps.pages_site.outcome == 'success'
        uses: actions/configure-pages@v5

      - name: Pages setup notice
        if: steps.pages_site.outcome != 'success'
        run: echo "GitHub Pages is not enabled yet; build and verification passed, deployment skipped."

      - name: Upload Pages artifact
        if: steps.pages_site.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: exports/pages

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
